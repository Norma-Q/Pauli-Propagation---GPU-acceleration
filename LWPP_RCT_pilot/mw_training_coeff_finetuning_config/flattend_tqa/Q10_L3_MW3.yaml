DIRECTORY:
  output_root: /home/ubuntu/PPS-lab/test_qaoa/mw_training_coeff_finetuning_results
  graph_dir: /home/ubuntu/PPS-lab/test_qaoa/graph
GRAPH:
  n_qubits: 10
  edge_prob: 0.3
  seed: 42
QAOA:
  n_layers: 3
  delta_t: 0.8
  init_strategy: flattend_tqa
  flatten_alpha: 0.5
MW_TRAINING:
  max_weight: 3
  steps: 100
  lr: 0.05
COEFF_FINETUNING:
  enabled: true
  build_min_abs: 1.0e-3
  rebuild_interval: 15
  steps: 150
  lr: 0.02
  max_weight_override: null
RUNTIME:
  device: auto
  chunk_size: 20000000
  parallel_compile: false
  log_every: 10
ANALYSIS:
  exact_enabled: true
  exact_large_step_stride: 1
  plot_metric: expected_cut
CHECKPOINTS:
  mw_steps: [1, 10, 25]
  coeff_steps: [1, 50, 150]
SAMPLING:
  enabled: true
  shots: 4000
  seed: 42
